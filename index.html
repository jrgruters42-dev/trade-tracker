<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Tracker - Cloud Sync</title>
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 12px; }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 20px; font-size: 2.2em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .sync-status { background: white; border-radius: 12px; padding: 15px 20px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; justify-content: space-between; align-items: center; }
        .sync-indicator { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .sync-dot { width: 12px; height: 12px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .account-setup { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { background: rgba(255,255,255,0.2); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; transition: all 0.3s; }
        .tab.active { background: white; color: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        h2 { color: #667eea; margin-bottom: 20px; font-size: 1.4em; border-bottom: 3px solid #667eea; padding-bottom: 10px; }
        .stat-box-compact { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 0.75em; opacity: 0.95; margin-bottom: 4px; font-weight: 500; }
        .stat-value { font-size: 1.3em; font-weight: 700; }
        input, select, textarea { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        th { background: #f5f5f5; color: #667eea; font-weight: 700; }
        #passwordScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; z-index: 99999; }
        #firebaseSetupModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; }
    </style>
</head>
<body>
    <div id="passwordScreen">
        <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-width: 400px; width: 90%;">
            <h2 style="text-align: center; color: #667eea; margin-bottom: 20px;">🔒 Trade Tracker</h2>
            <input type="password" id="passwordInput" placeholder="Enter password" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; margin-bottom: 15px;" onkeypress="if(event.key === 'Enter') checkPassword()">
            <button onclick="checkPassword()" style="width: 100%; padding: 12px;">Unlock</button>
        </div>
    </div>

    <div class="container">
        <h1>📊 Trade Tracker</h1>
        <div class="sync-status">
            <div class="sync-indicator"><div class="sync-dot" id="syncDot"></div><span id="syncStatus">Connecting...</span></div>
            <div><button onclick="forceSaveToFirebase()" style="padding: 5px 10px; font-size: 11px;">💾 Save</button><button onclick="openFirebaseSetup()" style="padding: 5px 10px; font-size: 11px;">⚙️</button></div>
        </div>

        <div class="account-setup">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px;">
                <div><label>Trading Account</label><input type="number" id="accountSize" onchange="updateAllStats()"></div>
                <div><label>My Roth</label><input type="number" id="myRoth" onchange="updateAllStats()"></div>
                <div><label>Wife Roth</label><input type="number" id="wifeRoth" onchange="updateAllStats()"></div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <div class="stat-box-compact"><div class="stat-label">Trading YTD</div><div id="tradingYTD">0%</div></div>
                <div class="stat-box-compact"><div class="stat-label">My Roth YTD</div><div id="myRothYTD">0%</div></div>
                <div class="stat-box-compact"><div class="stat-label">Wife Roth YTD</div><div id="wifeRothYTD">0%</div></div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('open-positions')">Open Positions</button>
            <button class="tab" onclick="switchTab('closed-trades')">Closed Trades</button>
        </div>

        <div id="open-positions" class="tab-content active">
            <div class="card">
                <h2>Portfolio Summary</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px;">
                    <div class="stat-box-compact"><div class="stat-label">Total Risk %</div><div id="totalPortfolioRisk">0%</div></div>
                    <div class="stat-box-compact"><div class="stat-label">If All Stop Out</div><div id="ifAllStopOut">$0</div></div>
                    <div class="stat-box-compact"><div class="stat-label">Cash Available</div><div id="cashAvailable">$0</div></div>
                </div>
            </div>
            <div class="card">
                <h2>Add Position</h2>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                    <input type="text" id="symbol" placeholder="Symbol">
                    <input type="number" id="entryPrice" placeholder="Price">
                    <input type="number" id="initialStop" placeholder="Stop">
                    <input type="number" id="shares" placeholder="QTY">
                </div>
                <button onclick="addPosition()" style="margin-top: 10px;">Add Position</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>Symbol</th><th>Entry</th><th>QTY</th><th>Stop</th><th>Risk $</th><th>Actions</th></tr></thead>
                    <tbody id="openPositionsBody"></tbody>
                </table>
            </div>
        </div>

        <div id="closed-trades" class="tab-content">
            <div class="card">
                <h2>History</h2>
                <table>
                    <thead><tr><th>Date</th><th>Symbol</th><th>P&L $</th><th>R-Mult</th></tr></thead>
                    <tbody id="closedTradesBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="firebaseSetupModal">
        <div class="modal-content">
            <h2>Firebase Config</h2>
            <textarea id="fbConfigJson" rows="8" placeholder="Paste JSON config here"></textarea>
            <button onclick="saveFirebaseConfig()" style="width: 100%; margin-top: 10px;">Save & Connect</button>
        </div>
    </div>

    <script>
        let trades = [];
        let dbRef = null;
        function checkPassword() { if(document.getElementById('passwordInput').value === 'trading2026') { document.getElementById('passwordScreen').style.display='none'; sessionStorage.setItem('trackerAuth','true'); } }
        window.onload = () => { if(sessionStorage.getItem('trackerAuth')==='true') document.getElementById('passwordScreen').style.display='none'; loadFirebase(); };
        
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        function updateAllStats() {
            const open = trades.filter(t => t.status === 'Open');
            const closed = trades.filter(t => t.status === 'Closed');
            let totalRisk = 0, stopOut = 0;
            open.forEach(t => {
                const risk = (t.entryPrice - t.initialStop) * t.shares;
                totalRisk += risk;
            });
            document.getElementById('ifAllStopOut').textContent = `$${totalRisk.toFixed(2)}`;
            saveToFirebase();
        }

        function addPosition() {
            const t = { id: Date.now(), symbol: document.getElementById('symbol').value.toUpperCase(), entryPrice: parseFloat(document.getElementById('entryPrice').value), initialStop: parseFloat(document.getElementById('initialStop').value), shares: parseInt(document.getElementById('shares').value), status: 'Open', date: new Date().toISOString() };
            trades.push(t); renderTables(); updateAllStats();
        }

        function renderTables() {
            const body = document.getElementById('openPositionsBody');
            body.innerHTML = '';
            trades.filter(t => t.status === 'Open').forEach(t => {
                const risk = (t.entryPrice - t.initialStop) * t.shares;
                body.innerHTML += `<tr><td>${t.symbol}</td><td>$${t.entryPrice}</td><td>${t.shares}</td><td>$${t.initialStop}</td><td>-$${risk.toFixed(2)}</td><td><button onclick="closeTrade(${t.id})">Close</button></td></tr>`;
            });
        }

        function closeTrade(id) {
            const exit
