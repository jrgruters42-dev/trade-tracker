<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Iron Log</title>
  <link rel="manifest" href="ironlog-manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Iron Log" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; background: #0a0a0a; font-family: 'Barlow', sans-serif; color: #ffffff; overscroll-behavior: none; }
    #root { width: 100%; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); min-height: 100vh; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    input:focus, select:focus { border-color: #f97316 !important; outline: none; }
    select option { background: #1a1a1a; color: #fff; }
    button:active { opacity: 0.75; transform: scale(0.97); }
  </style>
</head>
<body>
<div id="root"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCOnsbvHzyhh5x5hNvXO0MGTcofBgti1vg",
    authDomain: "iron-log-45723.firebaseapp.com",
    projectId: "iron-log-45723",
    storageBucket: "iron-log-45723.firebasestorage.app",
    messagingSenderId: "307059739548",
    appId: "1:307059739548:web:28a9cb45f791c707909659"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const googleProvider = new firebase.auth.GoogleAuthProvider();
</script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const TODAY = new Date().toISOString().split("T")[0];

  async function loadUserData(uid) {
    try { const doc = await db.collection("users").doc(uid).get(); return doc.exists ? doc.data() : {}; }
    catch(e) { return {}; }
  }
  async function saveUserData(uid, data) {
    try { await db.collection("users").doc(uid).set(data); } catch(e) { console.error(e); }
  }
  function formatDate(ds) {
    return new Date(ds + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
  }

  // ── Design tokens — everything bright white, nothing grey ────────
  const ORANGE = "#f97316";
  const BLUE   = "#38bdf8";
  const WHITE  = "#ffffff";
  const DIM    = "#aaaaaa";   // only used for truly secondary info, never body text
  const CARD   = "#1a1a1a";
  const CARD2  = "#222222";
  const BORDER = "#333333";

  const thSt = {
    fontFamily: "Oswald,sans-serif", fontSize: 18, letterSpacing: 1,
    color: WHITE, padding: "14px 8px", textAlign: "center",
    borderBottom: `2px solid ${BORDER}`, background: CARD2
  };
  const tdSt = { padding: "14px 8px", textAlign: "center", borderBottom: `1px solid ${BORDER}` };

  const inSt = {
    width: "100%", background: "#111", border: `2px solid ${BORDER}`,
    borderRadius: 10, color: WHITE, fontFamily: "Barlow,sans-serif",
    fontSize: 38, fontWeight: 700, padding: "18px 8px", textAlign: "center", outline: "none"
  };

  const selSt = (val) => ({
    width: "100%", background: "#111", border: `2px solid ${BORDER}`,
    borderRadius: 12, color: val ? WHITE : DIM,
    fontFamily: "Barlow,sans-serif", fontSize: 24, fontWeight: 500, padding: "20px 16px"
  });

  const slabel = {
    fontFamily: "Oswald,sans-serif", fontSize: 17, letterSpacing: 2, color: DIM, fontWeight: 600
  };

  function bigBtn(active, isCardio) {
    const bg = active ? (isCardio ? BLUE : ORANGE) : "#222";
    const fg = active ? (isCardio ? "#000" : WHITE) : "#555";
    return {
      width: "100%", padding: 24, border: "none", borderRadius: 14,
      background: bg, color: fg,
      fontFamily: "Oswald,sans-serif", fontSize: 26, fontWeight: 700,
      letterSpacing: 2, cursor: active ? "pointer" : "not-allowed"
    };
  }

  const iconBtn = {
    background: "none", border: `2px solid ${BORDER}`, borderRadius: 10,
    color: DIM, fontSize: 22, padding: "10px 18px", cursor: "pointer", fontFamily: "Barlow,sans-serif"
  };

  // ── Sign In ──────────────────────────────────────────────────────
  function SignIn() {
    const [err, setErr] = useState(null);
    const [loading, setLoading] = useState(false);
    async function go() {
      try { setErr(null); setLoading(true); await auth.signInWithPopup(googleProvider); }
      catch(e) { setErr("Sign in failed — try again."); setLoading(false); }
    }
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 28, background: "#0a0a0a" }}>
        <div style={{ fontFamily: "Oswald,sans-serif", fontSize: 56, fontWeight: 700, letterSpacing: 6, color: ORANGE }}>IRON LOG</div>
        <div style={{ fontFamily: "Oswald,sans-serif", fontSize: 18, letterSpacing: 4, color: DIM, marginBottom: 60, marginTop: 10 }}>TRACK · PROGRESS · CRUSH</div>
        <button onClick={go} disabled={loading}
          style={{ background: loading ? "#222" : WHITE, color: loading ? "#555" : "#000", border: "none", borderRadius: 14, padding: "24px 0", fontSize: 26, fontFamily: "Barlow,sans-serif", fontWeight: 700, cursor: "pointer", width: "100%" }}>
          {loading ? "Signing in..." : "Sign in with Google"}
        </button>
        {err && <div style={{ color: "#ef4444", marginTop: 20, fontSize: 22 }}>{err}</div>}
      </div>
    );
  }

  // ── Rest Timer ───────────────────────────────────────────────────
  function RestTimer({ timerKey, onDismiss }) {
    const DUR = 90;
    const [sec, setSec] = useState(DUR);
    useEffect(() => { setSec(DUR); }, [timerKey]);
    useEffect(() => {
      if (sec <= 0) return;
      const t = setTimeout(() => setSec(s => s - 1), 1000);
      return () => clearTimeout(t);
    }, [sec]);
    const pct = (sec / DUR) * 100;
    const color = sec > 45 ? "#22c55e" : sec > 20 ? "#eab308" : "#ef4444";
    return (
      <div style={{ position: "fixed", bottom: "calc(14px + env(safe-area-inset-bottom))", left: 14, right: 14, zIndex: 100, background: "#0a0a0a", border: `3px solid ${color}`, borderRadius: 18, padding: "18px 20px", textAlign: "center", boxShadow: "0 8px 40px rgba(0,0,0,0.95)" }}>
        <div style={{ fontFamily: "Oswald,sans-serif", fontSize: 16, letterSpacing: 4, color: DIM, marginBottom: 4 }}>REST TIMER</div>
        <div style={{ fontFamily: "Oswald,sans-serif", fontSize: 96, fontWeight: 700, color, lineHeight: 1 }}>
          {Math.floor(sec / 60)}:{String(sec % 60).padStart(2, "0")}
        </div>
        <div style={{ height: 10, background: "#222", borderRadius: 5, margin: "14px 0", overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: color, borderRadius: 5, transition: "width 1s linear" }} />
        </div>
        {sec === 0 && <div style={{ color: "#ef4444", fontSize: 28, marginBottom: 12, fontWeight: 700 }}>TIME'S UP! 💪</div>}
        <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
          <button onClick={() => setSec(DUR)} style={{ ...iconBtn, fontSize: 22, padding: "14px 32px", color: WHITE }}>Reset</button>
          <button onClick={onDismiss} style={{ ...iconBtn, fontSize: 22, padding: "14px 32px", color: WHITE, background: "#222" }}>Dismiss</button>
        </div>
      </div>
    );
  }

  // ── Set Table ────────────────────────────────────────────────────
  function SetTable({ sets, readonly, entryId, onUpdate, onRepsBlur }) {
    return (
      <table style={{ width: "100%", borderCollapse: "collapse" }}>
        <thead>
          <tr>
            <th style={thSt}>SET</th>
            <th style={thSt}>WEIGHT (lb)</th>
            <th style={thSt}>REPS</th>
          </tr>
        </thead>
        <tbody>
          {sets.map((s, i) => (
            <tr key={i} style={{ background: i % 2 === 0 ? CARD : "#202020" }}>
              <td style={{ ...tdSt, color: ORANGE, fontFamily: "Oswald,sans-serif", fontSize: 32, fontWeight: 700, width: 56 }}>{i + 1}</td>
              <td style={tdSt}>
                {readonly
                  ? <span style={{ color: WHITE, fontSize: 28, fontWeight: 700 }}>{s.weight || "—"}</span>
                  : <input type="number" inputMode="decimal" placeholder="0" value={s.weight} onChange={e => onUpdate(entryId, i, "weight", e.target.value)} style={inSt} />}
              </td>
              <td style={tdSt}>
                {readonly
                  ? <span style={{ color: WHITE, fontSize: 28, fontWeight: 700 }}>{s.reps || "—"}</span>
                  : <input type="number" inputMode="numeric" placeholder="0" value={s.reps} onChange={e => onUpdate(entryId, i, "reps", e.target.value)} onBlur={e => onRepsBlur(e.target.value)} style={inSt} />}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    );
  }

  // ── Last Time Banner ─────────────────────────────────────────────
  function LastTimeBanner({ last, isCardio }) {
    const accent = isCardio ? BLUE : ORANGE;
    if (!last) return (
      <div style={{ background: "#111", borderLeft: `5px solid ${accent}`, padding: "14px 16px", borderRadius: "0 10px 10px 0" }}>
        <div style={{ color: accent, fontSize: 22, fontWeight: 700 }}>First time — set a baseline! 🔥</div>
      </div>
    );
    return (
      <div style={{ background: "#111", borderLeft: `5px solid ${accent}`, padding: "14px 16px", borderRadius: "0 10px 10px 0" }}>
        <div style={{ fontFamily: "Oswald,sans-serif", fontSize: 15, letterSpacing: 2, color: accent, marginBottom: 10 }}>LAST TIME · {formatDate(last.date)}</div>
        {isCardio ? (
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <span style={{ fontSize: 24, color: WHITE, fontWeight: 700, background: "#1e1e1e", padding: "8px 16px", borderRadius: 8 }}>{last.duration} min</span>
            {last.distance && <span style={{ fontSize: 24, color: WHITE, fontWeight: 700, background: "#1e1e1e", padding: "8px 16px", borderRadius: 8 }}>{last.distance} mi</span>}
          </div>
        ) : (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
            {last.sets.map((s, i) => (
              <span key={i} style={{ fontSize: 22, color: WHITE, fontWeight: 700, background: "#1e1e1e", padding: "8px 14px", borderRadius: 8 }}>
                S{i + 1}: {s.weight || "—"}lb × {s.reps || "—"}
              </span>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ── Date Card ────────────────────────────────────────────────────
  function DateCard({ date, strength, cardio }) {
    const [open, setOpen] = useState(false);
    const total = (strength?.length || 0) + (cardio?.length || 0);
    return (
      <div style={{ background: CARD, borderRadius: 14, overflow: "hidden", border: `1px solid ${BORDER}` }}>
        <button onClick={() => setOpen(o => !o)} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 16px", background: "none", border: "none", cursor: "pointer", color: WHITE }}>
          <span style={{ fontFamily: "Oswald,sans-serif", fontSize: 24, fontWeight: 700, color: WHITE }}>{formatDate(date)}</span>
          <span style={{ fontSize: 20, color: DIM }}>{total} activit{total !== 1 ? "ies" : "y"} {open ? "▲" : "▼"}</span>
        </button>
        {open && <>
          {cardio?.length > 0 && (
            <div style={{ borderTop: `2px solid ${BORDER}`, padding: "14px 16px" }}>
              <div style={{ fontFamily: "Oswald,sans-serif", fontSize: 16, letterSpacing: 2, color: BLUE, marginBottom: 10 }}>CARDIO</div>
              {cardio.map((c, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 0", borderBottom: i < cardio.length - 1 ? `1px solid ${BORDER}` : "none" }}>
                  <span style={{ fontFamily: "Oswald,sans-serif", fontSize: 26, color: WHITE, fontWeight: 700, flex: 1 }}>{c.name}</span>
                  <span style={{ fontSize: 24, color: WHITE, fontWeight: 700 }}>{c.duration} min</span>
                  {c.distance && <span style={{ fontSize: 22, color: DIM }}>{c.distance} mi</span>}
                </div>
              ))}
            </div>
          )}
          {strength?.map((entry, i) => (
            <div key={i} style={{ borderTop: `2px solid ${BORDER}`, padding: "14px 16px" }}>
              <div style={{ color: ORANGE, fontFamily: "Oswald,sans-serif", fontSize: 26, fontWeight: 700, marginBottom: 10 }}>{entry.name}</div>
              <SetTable sets={entry.sets} readonly />
            </div>
          ))}
        </>}
      </div>
    );
  }

  function ExItem({ name, accent, onDelete }) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 16px", background: CARD, borderRadius: 12, border: `1px solid ${BORDER}`, borderLeft: `5px solid ${accent}` }}>
        <span style={{ fontSize: 26, color: WHITE, fontFamily: "Barlow,sans-serif", fontWeight: 700 }}>{name}</span>
        <button onClick={onDelete} style={{ ...iconBtn, padding: "10px 18px" }}>✕</button>
      </div>
    );
  }

  function SectionHeader({ color, label }) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
        <div style={{ width: 6, height: 32, background: color, borderRadius: 3 }} />
        <span style={{ fontFamily: "Oswald,sans-serif", fontSize: 28, fontWeight: 700, letterSpacing: 3, color }}>{label}</span>
      </div>
    );
  }

  // ── Main App ─────────────────────────────────────────────────────
  function App({ user }) {
    const [tab, setTab] = useState("log");
    const [exercises, setExercises] = useState([]);
    const [workouts, setWorkouts] = useState({});
    const [selEx, setSelEx] = useState("");
    const [numSets, setNumSets] = useState(3);
    const [newEx, setNewEx] = useState("");
    const [cardioExercises, setCardioExercises] = useState([]);
    const [cardioWorkouts, setCardioWorkouts] = useState({});
    const [selCardio, setSelCardio] = useState("");
    const [cardioDuration, setCardioDuration] = useState("");
    const [cardioDistance, setCardioDistance] = useState("");
    const [newCardioEx, setNewCardioEx] = useState("");
    const [timerVisible, setTimerVisible] = useState(false);
    const [timerKey, setTimerKey] = useState(0);
    const [histView, setHistView] = useState("date");
    const [histEx, setHistEx] = useState("");
    const [histCardioEx, setHistCardioEx] = useState("");
    const [histType, setHistType] = useState("strength");
    const [loaded, setLoaded] = useState(false);
    const [saveStatus, setSaveStatus] = useState("saved");
    const saveTimer = useRef(null);

    useEffect(() => {
      loadUserData(user.uid).then(data => {
        if (data.exercises) setExercises(data.exercises);
        if (data.workouts) setWorkouts(data.workouts);
        if (data.cardioExercises) setCardioExercises(data.cardioExercises);
        if (data.cardioWorkouts) setCardioWorkouts(data.cardioWorkouts);
        setLoaded(true);
      });
    }, [user.uid]);

    useEffect(() => {
      if (!loaded) return;
      setSaveStatus("saving");
      if (saveTimer.current) clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => {
        saveUserData(user.uid, { exercises, workouts, cardioExercises, cardioWorkouts }).then(() => setSaveStatus("saved"));
      }, 1500);
    }, [exercises, workouts, cardioExercises, cardioWorkouts, loaded]);

    const todayStrength = workouts[TODAY] || [];
    const todayCardio = cardioWorkouts[TODAY] || [];
    const allDates = [...new Set([...Object.keys(workouts), ...Object.keys(cardioWorkouts)])].sort().reverse();

    function addStrength() {
      if (!selEx) return;
      const sets = Array.from({ length: numSets }, () => ({ weight: "", reps: "" }));
      setWorkouts(prev => ({ ...prev, [TODAY]: [...(prev[TODAY] || []), { id: Date.now(), name: selEx, sets }] }));
    }
    function updateSet(entryId, si, field, value) {
      setWorkouts(prev => {
        const day = [...(prev[TODAY] || [])];
        const ei = day.findIndex(e => e.id === entryId);
        if (ei < 0) return prev;
        day[ei] = { ...day[ei], sets: day[ei].sets.map((s, i) => i === si ? { ...s, [field]: value } : s) };
        return { ...prev, [TODAY]: day };
      });
    }
    function onRepsBlur(val) {
      if (val && val.trim()) { setTimerVisible(true); setTimerKey(k => k + 1); }
    }
    function getLastStrength(name) {
      for (const d of Object.keys(workouts).filter(d => d < TODAY).sort().reverse()) {
        const e = workouts[d]?.find(e => e.name === name);
        if (e) return { date: d, sets: e.sets };
      }
      return null;
    }
    function getStrengthHistory(name) {
      return Object.keys(workouts).filter(d => workouts[d]?.some(e => e.name === name))
        .sort().reverse().map(d => ({ date: d, sets: workouts[d].find(e => e.name === name).sets }));
    }
    function addCardio() {
      if (!selCardio || !cardioDuration) return;
      setCardioWorkouts(prev => ({ ...prev, [TODAY]: [...(prev[TODAY] || []), { id: Date.now(), name: selCardio, duration: cardioDuration, distance: cardioDistance }] }));
      setCardioDuration(""); setCardioDistance("");
    }
    function getLastCardio(name) {
      for (const d of Object.keys(cardioWorkouts).filter(d => d < TODAY).sort().reverse()) {
        const e = cardioWorkouts[d]?.find(e => e.name === name);
        if (e) return { date: d, duration: e.duration, distance: e.distance };
      }
      return null;
    }
    function getCardioHistory(name) {
      return Object.keys(cardioWorkouts).filter(d => cardioWorkouts[d]?.some(e => e.name === name))
        .sort().reverse().map(d => ({ date: d, ...cardioWorkouts[d].find(e => e.name === name) }));
    }
    function addEx(val, list, setter, setVal) {
      const t = val.trim();
      if (!t || list.includes(t)) return;
      setter(prev => [...prev, t].sort((a, b) => a.localeCompare(b)));
      setVal("");
    }

    if (!loaded) return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#0a0a0a" }}>
        <div style={{ color: DIM, fontFamily: "Oswald,sans-serif", fontSize: 24, letterSpacing: 4 }}>LOADING...</div>
      </div>
    );

    const P = 14;
    const card = { background: CARD, borderRadius: 14, padding: 16, display: "flex", flexDirection: "column", gap: 18, border: `1px solid ${BORDER}` };
    const col = { display: "flex", flexDirection: "column", gap: 16 };

    return (
      <div style={{ background: "#0a0a0a", color: WHITE, minHeight: "100vh", width: "100%" }}>
        {timerVisible && <RestTimer timerKey={timerKey} onDismiss={() => setTimerVisible(false)} />}

        {/* HEADER */}
        <header style={{ padding: `16px ${P}px 12px`, borderBottom: `3px solid ${ORANGE}`, display: "flex", alignItems: "center", justifyContent: "space-between", background: "#0a0a0a" }}>
          <div>
            <div style={{ fontFamily: "Oswald,sans-serif", fontSize: 40, fontWeight: 700, letterSpacing: 5, color: ORANGE, lineHeight: 1 }}>IRON LOG</div>
            <div style={{ fontSize: 16, color: DIM, textTransform: "uppercase", letterSpacing: 1, marginTop: 4 }}>
              {new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8 }}>
            <div style={{ fontSize: 14, color: saveStatus === "saving" ? "#eab308" : "#444", fontFamily: "Oswald,sans-serif", letterSpacing: 1 }}>
              {saveStatus === "saving" ? "● SAVING" : "● SAVED"}
            </div>
            <button onClick={() => auth.signOut()} style={{ ...iconBtn, fontSize: 15, padding: "6px 14px" }}>Sign out</button>
          </div>
        </header>

        {/* NAV */}
        <nav style={{ display: "flex", background: "#111", borderBottom: `2px solid ${BORDER}` }}>
          {[["log", "📋 LOG"], ["history", "📊 HISTORY"], ["exercises", "⚙️ EXERCISES"]].map(([t, label]) => (
            <button key={t} onClick={() => setTab(t)}
              style={{ flex: 1, padding: "20px 4px", background: "none", border: "none", borderBottom: tab === t ? `4px solid ${ORANGE}` : "4px solid transparent", color: tab === t ? ORANGE : DIM, fontFamily: "Oswald,sans-serif", fontSize: 16, fontWeight: 700, letterSpacing: 1, cursor: "pointer" }}>
              {label}
            </button>
          ))}
        </nav>

        <main style={{ padding: P }}>

          {/* ── LOG TAB ── */}
          {tab === "log" && (
            <div style={{ ...col, gap: 24 }}>

              {/* CARDIO */}
              <div style={col}>
                <SectionHeader color={BLUE} label="CARDIO" />
                <div style={card}>
                  <div style={slabel}>SELECT ACTIVITY</div>
                  <select value={selCardio} onChange={e => setSelCardio(e.target.value)} style={selSt(selCardio)}>
                    <option value="">— Select Activity —</option>
                    {cardioExercises.map(ex => <option key={ex} value={ex}>{ex}</option>)}
                  </select>
                  {selCardio && <LastTimeBanner last={getLastCardio(selCardio)} isCardio />}
                  <div style={{ display: "flex", gap: 12 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ ...slabel, marginBottom: 10 }}>DURATION (min)</div>
                      <input type="number" inputMode="numeric" placeholder="0" value={cardioDuration} onChange={e => setCardioDuration(e.target.value)} style={inSt} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ ...slabel, marginBottom: 10 }}>DISTANCE (mi) <span style={{ fontSize: 13, color: "#555" }}>opt.</span></div>
                      <input type="number" inputMode="decimal" placeholder="0" value={cardioDistance} onChange={e => setCardioDistance(e.target.value)} style={inSt} />
                    </div>
                  </div>
                  <button onClick={addCardio} disabled={!selCardio || !cardioDuration} style={bigBtn(selCardio && cardioDuration, true)}>+ ADD CARDIO</button>
                </div>

                {todayCardio.map(c => (
                  <div key={c.id} style={{ background: CARD, borderRadius: 14, border: `1px solid ${BORDER}`, borderLeft: `5px solid ${BLUE}`, padding: "18px 16px", display: "flex", alignItems: "center" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: "Oswald,sans-serif", fontSize: 30, fontWeight: 700, color: WHITE }}>{c.name}</div>
                      <div style={{ marginTop: 10, display: "flex", gap: 10 }}>
                        <span style={{ background: "#0a1e2e", color: BLUE, padding: "8px 18px", borderRadius: 24, fontSize: 24, fontWeight: 700 }}>{c.duration} min</span>
                        {c.distance && <span style={{ background: "#1a1a1a", color: WHITE, padding: "8px 18px", borderRadius: 24, fontSize: 24, fontWeight: 700 }}>{c.distance} mi</span>}
                      </div>
                    </div>
                    <button onClick={() => setCardioWorkouts(prev => ({ ...prev, [TODAY]: prev[TODAY].filter(e => e.id !== c.id) }))} style={iconBtn}>✕</button>
                  </div>
                ))}
              </div>

              <div style={{ borderTop: `2px solid ${BORDER}` }} />

              {/* WEIGHTS */}
              <div style={col}>
                <SectionHeader color={ORANGE} label="WEIGHTS" />
                <div style={card}>
                  <div style={slabel}>SELECT EXERCISE</div>
                  <select value={selEx} onChange={e => setSelEx(e.target.value)} style={selSt(selEx)}>
                    <option value="">— Select Exercise —</option>
                    {exercises.map(ex => <option key={ex} value={ex}>{ex}</option>)}
                  </select>
                  {selEx && <LastTimeBanner last={getLastStrength(selEx)} isCardio={false} />}

                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 0" }}>
                    <span style={{ fontFamily: "Oswald,sans-serif", fontSize: 22, letterSpacing: 2, color: WHITE, fontWeight: 700 }}>SETS</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
                      <button onClick={() => setNumSets(s => Math.max(1, s - 1))}
                        style={{ width: 64, height: 64, background: CARD2, border: `2px solid ${BORDER}`, borderRadius: 12, color: WHITE, fontSize: 40, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>−</button>
                      <span style={{ fontFamily: "Oswald,sans-serif", fontSize: 50, fontWeight: 700, color: WHITE, minWidth: 50, textAlign: "center" }}>{numSets}</span>
                      <button onClick={() => setNumSets(s => Math.min(10, s + 1))}
                        style={{ width: 64, height: 64, background: CARD2, border: `2px solid ${BORDER}`, borderRadius: 12, color: WHITE, fontSize: 40, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>+</button>
                    </div>
                  </div>

                  <button onClick={addStrength} disabled={!selEx} style={bigBtn(selEx, false)}>+ ADD TO WORKOUT</button>
                </div>

                {todayStrength.map(entry => (
                  <div key={entry.id} style={{ background: CARD, borderRadius: 14, overflow: "hidden", border: `1px solid ${BORDER}` }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "18px 16px", background: CARD2, borderBottom: `2px solid ${BORDER}` }}>
                      <span style={{ fontFamily: "Oswald,sans-serif", fontSize: 30, fontWeight: 700, color: WHITE }}>{entry.name}</span>
                      <button onClick={() => setWorkouts(prev => ({ ...prev, [TODAY]: prev[TODAY].filter(e => e.id !== entry.id) }))} style={iconBtn}>✕</button>
                    </div>
                    <SetTable sets={entry.sets} entryId={entry.id} onUpdate={updateSet} onRepsBlur={onRepsBlur} />
                  </div>
                ))}

                {todayStrength.length === 0 && todayCardio.length === 0 && (
                  <div style={{ textAlign: "center", color: DIM, fontSize: 22, padding: "28px 0 40px", fontWeight: 500 }}>Nothing logged yet today.</div>
                )}
              </div>
              <div style={{ height: timerVisible ? 180 : 0 }} />
            </div>
          )}

          {/* ── HISTORY TAB ── */}
          {tab === "history" && (
            <div style={col}>
              <div style={{ display: "flex", border: `2px solid ${BORDER}`, borderRadius: 14, overflow: "hidden" }}>
                {[["date", "BY DATE"], ["exercise", "BY EXERCISE"]].map(([v, label]) => (
                  <button key={v} onClick={() => setHistView(v)}
                    style={{ flex: 1, padding: 20, border: "none", cursor: "pointer", background: histView === v ? ORANGE : CARD, color: histView === v ? WHITE : DIM, fontFamily: "Oswald,sans-serif", fontSize: 20, fontWeight: 700, letterSpacing: 1 }}>
                    {label}
                  </button>
                ))}
              </div>

              {histView === "date" && (
                allDates.length === 0
                  ? <div style={{ textAlign: "center", color: DIM, fontSize: 24, padding: "52px 0" }}>No workout history yet.</div>
                  : allDates.map(date => <DateCard key={date} date={date} strength={workouts[date]} cardio={cardioWorkouts[date]} />)
              )}

              {histView === "exercise" && (
                <div style={col}>
                  <div style={{ display: "flex", border: `2px solid ${BORDER}`, borderRadius: 12, overflow: "hidden" }}>
                    {[["strength", "WEIGHTS", ORANGE, WHITE], ["cardio", "CARDIO", BLUE, "#000"]].map(([v, label, bg, fg]) => (
                      <button key={v} onClick={() => setHistType(v)}
                        style={{ flex: 1, padding: 18, border: "none", cursor: "pointer", background: histType === v ? bg : CARD, color: histType === v ? fg : DIM, fontFamily: "Oswald,sans-serif", fontSize: 18, fontWeight: 700, letterSpacing: 1 }}>
                        {label}
                      </button>
                    ))}
                  </div>

                  {histType === "strength" && <>
                    <select value={histEx} onChange={e => setHistEx(e.target.value)} style={selSt(histEx)}>
                      <option value="">— Select Exercise —</option>
                      {exercises.map(ex => <option key={ex} value={ex}>{ex}</option>)}
                    </select>
                    {histEx && (() => {
                      const hist = getStrengthHistory(histEx);
                      return hist.length === 0
                        ? <div style={{ textAlign: "center", color: DIM, fontSize: 22, padding: "36px 0" }}>No history yet.</div>
                        : hist.map(({ date, sets }) => (
                          <div key={date} style={{ background: CARD, borderRadius: 14, overflow: "hidden", border: `1px solid ${BORDER}` }}>
                            <div style={{ padding: "14px 16px", background: CARD2, borderBottom: `2px solid ${BORDER}`, fontFamily: "Oswald,sans-serif", fontSize: 22, fontWeight: 700, color: ORANGE }}>{formatDate(date)}</div>
                            <SetTable sets={sets} readonly />
                          </div>
                        ));
                    })()}
                  </>}

                  {histType === "cardio" && <>
                    <select value={histCardioEx} onChange={e => setHistCardioEx(e.target.value)} style={selSt(histCardioEx)}>
                      <option value="">— Select Activity —</option>
                      {cardioExercises.map(ex => <option key={ex} value={ex}>{ex}</option>)}
                    </select>
                    {histCardioEx && (() => {
                      const hist = getCardioHistory(histCardioEx);
                      return hist.length === 0
                        ? <div style={{ textAlign: "center", color: DIM, fontSize: 22, padding: "36px 0" }}>No history yet.</div>
                        : hist.map(({ date, duration, distance }) => (
                          <div key={date} style={{ background: CARD, borderRadius: 14, border: `1px solid ${BORDER}`, borderLeft: `5px solid ${BLUE}`, padding: "18px 16px", display: "flex", alignItems: "center", gap: 14 }}>
                            <span style={{ fontFamily: "Oswald,sans-serif", fontSize: 20, color: WHITE, fontWeight: 700, flex: 1 }}>{formatDate(date)}</span>
                            <span style={{ background: "#0a1e2e", color: BLUE, padding: "8px 18px", borderRadius: 24, fontSize: 22, fontWeight: 700 }}>{duration} min</span>
                            {distance && <span style={{ background: "#1a1a1a", color: WHITE, padding: "8px 18px", borderRadius: 24, fontSize: 22, fontWeight: 700 }}>{distance} mi</span>}
                          </div>
                        ));
                    })()}
                  </>}
                </div>
              )}
            </div>
          )}

          {/* ── EXERCISES TAB ── */}
          {tab === "exercises" && (
            <div style={{ ...col, gap: 24 }}>
              <div style={col}>
                <SectionHeader color={BLUE} label="CARDIO ACTIVITIES" />
                <div style={card}>
                  <input type="text" value={newCardioEx} onChange={e => setNewCardioEx(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addEx(newCardioEx, cardioExercises, setCardioExercises, setNewCardioEx)}
                    placeholder="e.g. Stairs, Treadmill..."
                    style={{ width: "100%", background: "#111", border: `2px solid ${BORDER}`, borderRadius: 12, color: WHITE, fontFamily: "Barlow,sans-serif", fontSize: 26, fontWeight: 700, padding: "18px 16px" }} />
                  <button disabled={!newCardioEx.trim() || cardioExercises.includes(newCardioEx.trim())}
                    onClick={() => addEx(newCardioEx, cardioExercises, setCardioExercises, setNewCardioEx)}
                    style={bigBtn(newCardioEx.trim() && !cardioExercises.includes(newCardioEx.trim()), true)}>
                    + ADD ACTIVITY
                  </button>
                </div>
                {cardioExercises.length === 0
                  ? <div style={{ color: DIM, fontSize: 22, padding: "10px 0" }}>No activities added yet.</div>
                  : cardioExercises.map(ex => <ExItem key={ex} name={ex} accent={BLUE} onDelete={() => setCardioExercises(prev => prev.filter(e => e !== ex))} />)
                }
              </div>

              <div style={{ borderTop: `2px solid ${BORDER}` }} />

              <div style={col}>
                <SectionHeader color={ORANGE} label="STRENGTH EXERCISES" />
                <div style={card}>
                  <input type="text" value={newEx} onChange={e => setNewEx(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addEx(newEx, exercises, setExercises, setNewEx)}
                    placeholder="e.g. Bench Press, Squat..."
                    style={{ width: "100%", background: "#111", border: `2px solid ${BORDER}`, borderRadius: 12, color: WHITE, fontFamily: "Barlow,sans-serif", fontSize: 26, fontWeight: 700, padding: "18px 16px" }} />
                  <button disabled={!newEx.trim() || exercises.includes(newEx.trim())}
                    onClick={() => addEx(newEx, exercises, setExercises, setNewEx)}
                    style={bigBtn(newEx.trim() && !exercises.includes(newEx.trim()), false)}>
                    + ADD EXERCISE
                  </button>
                </div>
                {exercises.length === 0
                  ? <div style={{ color: DIM, fontSize: 22, padding: "10px 0" }}>No exercises added yet.</div>
                  : exercises.map(ex => <ExItem key={ex} name={ex} accent={ORANGE} onDelete={() => setExercises(prev => prev.filter(e => e !== ex))} />)
                }
              </div>
            </div>
          )}
        </main>
      </div>
    );
  }

  function Root() {
    const [user, setUser] = useState(undefined);
    useEffect(() => { const unsub = auth.onAuthStateChanged(u => setUser(u || null)); return unsub; }, []);
    if (user === undefined) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#0a0a0a" }}><div style={{ color: DIM, fontFamily: "Oswald,sans-serif", fontSize: 24, letterSpacing: 4 }}>LOADING...</div></div>;
    if (!user) return <SignIn />;
    return <App user={user} />;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
